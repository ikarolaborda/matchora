# MatchOra full stack. Modern Compose (no top-level `version:` key).
#   docker compose up --build
# Brings up: web (Next.js standalone) + Postgres 17 + Kafka (KRaft) + Valkey.
# The web app defaults to the mock provider; in compose it is wired to the
# in-network Postgres/Kafka/Valkey. Set FOOTBALL_DATA_PROVIDER=api-football +
# API_FOOTBALL_KEY in .env to serve real data. Secrets come from .env at run
# time and are never baked into the image.

name: matchora

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: matchora/web:0.1.0
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # in-network service hostnames (override any host-oriented .env values)
      DATABASE_URL: postgres://matchora:matchora@postgres:5432/matchora
      REDIS_URL: redis://valkey:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      valkey:
        condition: service_started
    networks:
      - matchora

  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchora
      POSTGRES_PASSWORD: matchora
      POSTGRES_DB: matchora
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U matchora -d matchora']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - matchora

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    ports:
      - '29092:29092' # host-side client/debug listener
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: MatchOra-KRaft-Cluster1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Bind all interfaces via host-less ://:port form. A literal 0.0.0.0 here
      # makes the apache/kafka image advertise 0.0.0.0, which Kafka rejects.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - matchora

  valkey:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    command: ['valkey-server', '--save', '60', '1', '--appendonly', 'no']
    ports:
      - '6380:6379'
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - matchora

volumes:
  postgres-data:
  kafka-data:
  valkey-data:

networks:
  matchora:
    driver: bridge
